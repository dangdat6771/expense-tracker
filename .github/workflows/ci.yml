name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Ensure no concurrent runs for the same ref to save minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ════════════════════════════════════════════════════════════
  #  BACKEND
  # ════════════════════════════════════════════════════════════
  backend:
    name: Backend – Install / Lint / Test / Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup Node ────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      # ── 3. Install dependencies ──────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Lint ──────────────────────────────────────────────
      # Fails the pipeline if any lint error or warning is found
      - name: Lint
        run: npm run lint

      # ── 5. Unit tests ────────────────────────────────────────
      # Fails the pipeline on any test failure; --ci makes jest
      # exit non-zero even on snapshot mismatches
      - name: Run tests
        run: npm run test:ci
        env:
          JWT_SECRET: ci_test_secret
          NODE_ENV: test

      # ── 6. Upload coverage report ────────────────────────────
      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

      # ── 7. Docker build (acts as the "build" step) ───────────
      - name: Build Docker image
        run: |
          docker build \
            --no-cache \
            --tag expense-tracker-backend:${{ github.sha }} \
            .

  # ════════════════════════════════════════════════════════════
  #  FRONTEND
  # ════════════════════════════════════════════════════════════
  frontend:
    name: Frontend – Install / Lint / Test / Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup Node ────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # ── 3. Install dependencies ──────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Lint ──────────────────────────────────────────────
      - name: Lint
        run: npm run lint

      # ── 5. Unit tests ────────────────────────────────────────
      - name: Run tests
        run: npm run test:ci

      # ── 6. Upload coverage report ────────────────────────────
      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

      # ── 7. Production build ───────────────────────────────────
      - name: Build (Vite)
        run: npm run build

      # ── 8. Docker build ───────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build \
            --no-cache \
            --tag expense-tracker-frontend:${{ github.sha }} \
            .

  # ════════════════════════════════════════════════════════════
  #  SUMMARY (all jobs must pass – no bypass possible)
  # ════════════════════════════════════════════════════════════
  ci-success:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    # This job runs ONLY when ALL required jobs succeed.
    # Mark it as a required status check in branch protection
    # rules to block merging if anything fails.
    if: success()
    steps:
      - name: All CI jobs passed
        run: echo "✅ Backend and Frontend pipelines completed successfully."
